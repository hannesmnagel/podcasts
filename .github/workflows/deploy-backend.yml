name: Deploy Podcast Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: podcast-backend-deploy
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  SERVER_HOST: hannesnagel.com
  SERVER_USER: root
  SERVER_DIR: /root/podcasts-backend

jobs:
  test:
    name: Test backend
    runs-on: ubuntu-latest
    container: swift:6.2-noble
    defaults:
      run:
        working-directory: backend
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Run Swift tests with filtered output
        run: |
          set +e
          swift test 2>&1 | tee /tmp/swift-test.log | grep -E "(^Test Suite|^Test Case|^error:|^warning:|BUILD|FAILED|passed|Executed|\*\* TEST|fatal error)" || true
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            echo "swift test failed; tailing last 160 lines"
            tail -160 /tmp/swift-test.log
            exit "$status"
          fi

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on server
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ env.SERVER_HOST }}" >> ~/.ssh/known_hosts
      - name: Pull and restart Compose stack
        run: |
          ssh "${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}" \
            "cd '${SERVER_DIR}' && docker compose pull app && docker compose up -d --remove-orphans"
