name: Deploy Podcast Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: podcast-backend-deploy
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  SERVER_HOST: hannesnagel.com
  SERVER_USER: root
  SERVER_DIR: /root/podcasts-backend

jobs:
  test:
    name: Test backend
    runs-on: ubuntu-latest
    container: swift:6.2-noble
    defaults:
      run:
        working-directory: backend
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - name: Cache SwiftPM and .build
        uses: actions/cache@v4
        with:
          path: |
            backend/.build
            /github/home/.swiftpm
            /github/home/.cache/org.swift.swiftpm
          key: ${{ runner.os }}-backend-test-swift62-${{ hashFiles('backend/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-backend-test-swift62-
      - name: Run Swift tests with filtered output
        run: |
          set +e
          swift test 2>&1 | tee /tmp/swift-test.log | grep -E "(^Test Suite|^Test Case|^error:|^warning:|BUILD|FAILED|passed|Executed|\*\* TEST|fatal error)" || true
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            echo "swift test failed; tailing last 160 lines"
            tail -160 /tmp/swift-test.log
            exit "$status"
          fi
      - name: Build release backend binary
        run: swift build -c release --product PodcastBackend -j 2
      - name: Upload release backend binary
        uses: actions/upload-artifact@v4
        with:
          name: podcast-backend-linux-binary
          path: backend/.build/release/PodcastBackend
          if-no-files-found: error
          retention-days: 1

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - name: Download release backend binary
        uses: actions/download-artifact@v4
        with:
          name: podcast-backend-linux-binary
          path: backend
      - name: Ensure backend binary is executable
        run: chmod +x backend/PodcastBackend
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile.runtime
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=podcasts-backend-docker
          cache-to: type=gha,mode=max,scope=podcasts-backend-docker

  deploy:
    name: Deploy on server
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          touch ~/.ssh/known_hosts
          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -T 10 -H "${{ env.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null; then
              break
            fi
            echo "ssh-keyscan attempt ${attempt} failed, retrying..."
            sleep 5
          done
          ssh-keygen -F "${{ env.SERVER_HOST }}" -f ~/.ssh/known_hosts >/dev/null || {
            echo "Failed to add ${SERVER_HOST} to known_hosts after retries"
            exit 1
          }
      - name: Pull and restart Compose stack
        run: |
          ssh "${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}" \
            "cd '${SERVER_DIR}' && docker compose pull app && docker compose up -d --remove-orphans"
