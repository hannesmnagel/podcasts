name: Podcasts
options:
  bundleIdPrefix: com.nagel
  deploymentTarget:
    iOS: "26.1"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: X5933694SW
packages: {}
targets:
  Podcasts:
    type: application
    platform: iOS
    deploymentTarget: "26.1"
    sources:
      - path: ios/PodcastsApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nagel.podcasts
        PRODUCT_NAME: The Podcatcher
        INFOPLIST_KEY_CFBundleDisplayName: The Podcatcher
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_BackendBaseURL: https://podcasts.hannesnagel.com
        CURRENT_PROJECT_VERSION: 18
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    info:
      path: ios/PodcastsApp/Info.plist
      properties:
        CFBundleDisplayName: The Podcatcher
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "17"
        BackendBaseURL: https://podcasts.hannesnagel.com
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
